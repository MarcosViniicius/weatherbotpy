# WeatherBet risk configuration
# Updated via Telegram /setrisk or manual edit

[account]
balance = 20.0
max_bet = 2.0

[risk]
min_edge = 0.12          # Minimum real edge after costs (12%)
max_price = 0.45         # Only trade uncertain events (< 45c = market is genuinely split)
kelly_fraction = 0.15    # Conservative Kelly — 15% of full Kelly

[market_filters]
min_volume = 500         # Requires meaningful liquidity
min_hours = 4.0          # Don't enter if resolving in < 4h (slippage too high)
max_hours = 72.0         # Max 3-day forecast horizon
max_slippage = 0.015     # Strict slippage cap — 1.5%

[execution]
scan_interval = 300      # Scan every 5 minutes — fast enough to catch inefficiencies
relax_stage = 0

[model]
calibration_min = 50
